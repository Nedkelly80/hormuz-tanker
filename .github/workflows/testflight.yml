name: Build & Upload to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS & Upload to TestFlight
    runs-on: macos-15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap copy ios

      - name: Install CocoaPods
        run: |
          gem install cocoapods --no-document
          cd ios/App && pod install

      - name: Bump build number
        run: |
          BUILD=$(date +%Y%m%d%H%M)
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = $BUILD/g" \
            ios/App/App.xcodeproj/project.pbxproj
          echo "BUILD_NUMBER=$BUILD" >> $GITHUB_ENV

      - name: Decode App Store Connect API key
        run: |
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}" | base64 --decode > /tmp/asc_key.p8

      - name: Archive (Xcode)
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/HormuzPass.xcarchive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=ZVLXS8USMK \
            -allowProvisioningUpdates \
            -authenticationKeyPath /tmp/asc_key.p8 \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      - name: Export IPA
        run: |
          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>ZVLXS8USMK</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/HormuzPass.xcarchive \
            -exportPath $RUNNER_TEMP/HormuzPass-IPA \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath /tmp/asc_key.p8 \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/HormuzPass-IPA/App.ipa" \
            --apiKey "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" \
            --verbose

      - name: Commit bumped build number
        run: |
          git config user.email "trm.racinglooms@gmail.com"
          git config user.name "GitHub Actions"
          git add ios/App/App.xcodeproj/project.pbxproj
          git commit -m "CI: bump build number to ${{ env.BUILD_NUMBER }}" || echo "Nothing to commit"
          git push || echo "Push skipped"
