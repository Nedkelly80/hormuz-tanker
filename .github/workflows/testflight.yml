name: iOS Upload Caller

on:
  push:
    branches:
      - main
    tags:
      - v*
      - release-*
  workflow_dispatch:
    inputs:
      release_channel:
        description: Upload channel (testflight is fully automated, production uses protected environment)
        type: choice
        required: true
        default: testflight
        options:
          - testflight
          - production

jobs:
  upload-ios:
    permissions:
      contents: read
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/release-')
    uses: ./.github/workflows/ios-reusable-upload.yml
    with:
      app_scheme: App
      workspace_path: ios/App/App.xcworkspace
      bundle_id: com.hormuzpass.app
      team_id: ZVLXS8USMK
      release_channel: ${{ inputs.release_channel || 'testflight' }}
      allowed_branch: refs/heads/main
      allowed_tag_prefix: refs/tags/v
      allowed_tag_prefix_alt: refs/tags/release-
      artifact_retention_days: 14
      has_signing_cert: false
      has_provisioning_profile: false
      has_slack_webhook: false
      has_smtp_notification: false
    secrets:
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
      SIGNING_CERT_BASE64: ${{ secrets.SIGNING_CERT_BASE64 }}
      SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
      PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      FAILURE_EMAIL_FROM: ${{ secrets.FAILURE_EMAIL_FROM }}
      FAILURE_EMAIL_TO: ${{ secrets.FAILURE_EMAIL_TO }}
