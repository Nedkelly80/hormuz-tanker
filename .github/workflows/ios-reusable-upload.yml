name: Reusable iOS Build, Sign, and Upload

on:
  workflow_call:
    inputs:
      app_scheme:
        description: Xcode scheme name
        required: true
        type: string
      workspace_path:
        description: Path to .xcworkspace (use either workspace_path or project_path)
        required: false
        default: ""
        type: string
      project_path:
        description: Path to .xcodeproj (use either project_path or workspace_path)
        required: false
        default: ""
        type: string
      bundle_id:
        description: App bundle identifier
        required: true
        type: string
      team_id:
        description: Apple Developer Team ID
        required: true
        type: string
      release_channel:
        description: Upload channel
        required: false
        default: testflight
        type: string
      allowed_branch:
        description: Fully-qualified branch ref allowed for uploads
        required: false
        default: refs/heads/main
        type: string
      allowed_tag_prefix:
        description: Fully-qualified tag prefix allowed for uploads
        required: false
        default: refs/tags/v
        type: string
      allowed_tag_prefix_alt:
        description: Optional second fully-qualified tag prefix allowed for uploads
        required: false
        default: ""
        type: string
      artifact_retention_days:
        description: Artifact retention in days
        required: false
        default: 14
        type: number
      has_signing_cert:
        description: Whether SIGNING_CERT_BASE64 and SIGNING_CERT_PASSWORD secrets are set
        required: false
        default: false
        type: boolean
      has_provisioning_profile:
        description: Whether PROVISIONING_PROFILE_BASE64 secret is set
        required: false
        default: false
        type: boolean
      has_slack_webhook:
        description: Whether SLACK_WEBHOOK_URL secret is set
        required: false
        default: false
        type: boolean
      has_smtp_notification:
        description: Whether SMTP_* and email secrets are set
        required: false
        default: false
        type: boolean
    secrets:
      APP_STORE_CONNECT_API_KEY_ID:
        required: true
      APP_STORE_CONNECT_ISSUER_ID:
        required: true
      APP_STORE_CONNECT_API_KEY_BASE64:
        required: true
      SIGNING_CERT_BASE64:
        required: false
      SIGNING_CERT_PASSWORD:
        required: false
      PROVISIONING_PROFILE_BASE64:
        required: false
      SLACK_WEBHOOK_URL:
        required: false
      SMTP_SERVER:
        required: false
      SMTP_PORT:
        required: false
      SMTP_USERNAME:
        required: false
      SMTP_PASSWORD:
        required: false
      FAILURE_EMAIL_FROM:
        required: false
      FAILURE_EMAIL_TO:
        required: false

jobs:
  build-sign-upload:
    name: Build iOS and Upload to App Store Connect
    runs-on: macos-latest
    environment:
      name: ${{ inputs.release_channel == 'production' && 'production' || 'testflight' }}
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate upload scope and refs
        shell: bash
        run: |
          set -euo pipefail
          ALLOWED_BRANCH="${{ inputs.allowed_branch }}"
          ALLOWED_TAG_PREFIX="${{ inputs.allowed_tag_prefix }}"
          ALLOWED_TAG_PREFIX_ALT="${{ inputs.allowed_tag_prefix_alt }}"

          if [[ -z "${{ inputs.workspace_path }}" && -z "${{ inputs.project_path }}" ]]; then
            echo "Either workspace_path or project_path must be provided."
            exit 1
          fi

          if [[ -n "${{ inputs.workspace_path }}" && -n "${{ inputs.project_path }}" ]]; then
            echo "Provide only one of workspace_path or project_path."
            exit 1
          fi

          if [[ "${GITHUB_REF}" == "${ALLOWED_BRANCH}" || "${GITHUB_REF}" == ${ALLOWED_TAG_PREFIX}* || ( -n "${ALLOWED_TAG_PREFIX_ALT}" && "${GITHUB_REF}" == ${ALLOWED_TAG_PREFIX_ALT}* ) ]]; then
            echo "Ref ${GITHUB_REF} is approved for upload."
          else
            echo "Ref ${GITHUB_REF} is not approved. Allowed branch: ${ALLOWED_BRANCH}; tag prefixes: ${ALLOWED_TAG_PREFIX} ${ALLOWED_TAG_PREFIX_ALT}"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap copy ios

      - name: Install CocoaPods
        run: |
          gem install cocoapods --no-document
          cd ios/App && pod install

      - name: Set unique build number
        shell: bash
        run: |
          set -euo pipefail
          BUILD_NUMBER="$(date -u +%Y%m%d)$(printf '%06d' "${GITHUB_RUN_NUMBER}")$(printf '%02d' "${GITHUB_RUN_ATTEMPT}")"
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = ${BUILD_NUMBER}/g" ios/App/App.xcodeproj/project.pbxproj
          echo "BUILD_NUMBER=${BUILD_NUMBER}" >> "$GITHUB_ENV"

      - name: Decode App Store Connect API key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

      - name: Import signing certificate (optional)
        if: ${{ inputs.has_signing_cert }}
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.SIGNING_CERT_BASE64 }}
          p12-password: ${{ secrets.SIGNING_CERT_PASSWORD }}

      - name: Install provisioning profile (optional)
        if: ${{ inputs.has_provisioning_profile }}
        shell: bash
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/profile.mobileprovision"
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > "${PROFILE_PATH}"
          # Decode CMS envelope to plain plist, then extract UUID
          security cms -D -i "${PROFILE_PATH}" -o /tmp/decoded_profile.plist
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /tmp/decoded_profile.plist)
          rm -f /tmp/decoded_profile.plist
          mv "${PROFILE_PATH}" "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"
          echo "Installed profile UUID: ${PROFILE_UUID}"

      - name: Archive (Xcode)
        shell: bash
        run: |
          set -euo pipefail
          TARGET_ARG=""
          if [[ -n "${{ inputs.workspace_path }}" ]]; then
            TARGET_ARG="-workspace ${{ inputs.workspace_path }}"
          else
            TARGET_ARG="-project ${{ inputs.project_path }}"
          fi

          xcodebuild archive \
            ${TARGET_ARG} \
            -scheme "${{ inputs.app_scheme }}" \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/${{ inputs.app_scheme }}.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="hormuzpass-appstore-ci" \
            DEVELOPMENT_TEAM="${{ inputs.team_id }}" \
            PRODUCT_BUNDLE_IDENTIFIER="${{ inputs.bundle_id }}" \
            | tee "$RUNNER_TEMP/xcode-archive.log"

      - name: Package IPA from archive
        shell: bash
        run: |
          set -euo pipefail
          # xcodebuild -exportArchive fails with embedded Capacitor frameworks under
          # manual signingStyle on Xcode 16. The archive is already distribution-signed
          # (Distribution cert + hormuzpass-appstore-ci profile embedded during archive),
          # so we just package Payload/App.app directly into an IPA.
          ARCHIVE_PATH="$RUNNER_TEMP/${{ inputs.app_scheme }}.xcarchive"
          APP_PATH="$(find "${ARCHIVE_PATH}/Products/Applications" -maxdepth 1 -name '*.app' | head -n1)"
          if [[ -z "${APP_PATH}" ]]; then
            echo "No .app bundle found in archive at ${ARCHIVE_PATH}/Products/Applications"
            exit 1
          fi
          echo "Packaging: ${APP_PATH}"
          PAYLOAD_DIR="$RUNNER_TEMP/Payload"
          mkdir -p "${PAYLOAD_DIR}"
          cp -r "${APP_PATH}" "${PAYLOAD_DIR}/"
          IPA_PATH="$RUNNER_TEMP/${{ inputs.app_scheme }}.ipa"
          (cd "$RUNNER_TEMP" && zip -qr "${{ inputs.app_scheme }}.ipa" Payload)
          if [[ ! -f "${IPA_PATH}" ]]; then
            echo "IPA creation failed."
            exit 1
          fi
          echo "IPA created: ${IPA_PATH}"
          echo "IPA_PATH=${IPA_PATH}" >> "$GITHUB_ENV"

      - name: Upload to App Store Connect
        shell: bash
        run: |
          set -euo pipefail
          xcrun altool --upload-app \
            --type ios \
            --file "${IPA_PATH}" \
            --apiKey "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" \
            --verbose \
            | tee "$RUNNER_TEMP/appstore-upload.log"

      - name: Upload IPA and logs as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-upload-${{ github.run_id }}
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: warn
          path: |
            ${{ env.IPA_PATH }}
            ${{ runner.temp }}/xcode-archive.log
            ${{ runner.temp }}/appstore-upload.log

      - name: Notify Slack on failure
        if: ${{ failure() && inputs.has_slack_webhook }}
        shell: bash
        run: |
          payload=$(cat <<EOF
          {"text":"❌ iOS upload failed for ${GITHUB_REPOSITORY} (${GITHUB_REF_NAME}) in run ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"}
          EOF
          )
          curl -X POST -H 'Content-type: application/json' --data "$payload" "${{ secrets.SLACK_WEBHOOK_URL }}"

      - name: Notify email on failure
        if: ${{ failure() && inputs.has_smtp_notification }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT || 587 }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[CI Failure] iOS upload failed - ${{ github.repository }}"
          to: ${{ secrets.FAILURE_EMAIL_TO }}
          from: ${{ secrets.FAILURE_EMAIL_FROM }}
          body: |
            iOS upload failed.
            Repository: ${{ github.repository }}
            Ref: ${{ github.ref }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
